<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO App</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
        }
        form {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        input[type="text"] {
            flex: 1;
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 12px;
            margin-bottom: 8px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .empty-message {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1>TODO App</h1>

    <!-- TODO追加フォーム -->
    <form action="/add" method="POST">
        <input type="text" name="title" placeholder="新しいTODOを入力">
        <button type="submit">追加</button>
    </form>

    <!-- TODO一覧 -->
    {% if todos %}
    <ul>
        {% for todo in todos %}
        <li>{{ todo.title }}</li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="empty-message">TODOはまだありません。</p>
    {% endif %}
</body>
</html>
