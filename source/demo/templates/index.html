<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO App</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #333;
        }
        form.add-form {
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 8px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        button.delete-btn {
            background-color: #f44336;
            padding: 4px 10px;
            font-size: 0.85em;
        }
        button.delete-btn:hover {
            background-color: #d32f2f;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <h1>TODO App</h1>

    <form class="add-form" action="/add" method="POST">
        <input type="text" name="title" placeholder="新しいTODOを入力" required>
        <button type="submit">追加</button>
    </form>

    <ul>
        {% for todo in todos %}
        <li>
            <span>{{ todo.title }}</span>
            <form action="/delete/{{ loop.index0 }}" method="POST" style="display:inline;">
                <button type="submit" class="delete-btn">削除</button>
            </form>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
