<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO App</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #333;
        }
        form.add-form {
            margin-bottom: 20px;
        }
        input[type="text"] {
            padding: 8px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        button.delete-btn {
            background-color: #f44336;
            padding: 4px 10px;
            font-size: 0.85em;
        }
        button.delete-btn:hover {
            background-color: #d32f2f;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 12px 16px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }
        li:hover {
            background-color: #f0f0f0;
        }
        .todo-title {
            flex: 1;
        }
        .todo-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-left: 16px;
        }
        .check {
            color: #4CAF50;
            cursor: pointer;
            font-size: 1.2em;
            margin-right: 12px;
            background: none;
            border: none;
            padding: 0;
        }
        li.completed .todo-title {
            text-decoration: line-through;
            color: #999;
        }
    </style>
</head>
<body>
    <h1>TODO App</h1>

    <form class="add-form" action="/add" method="POST">
        <input type="text" name="title" placeholder="新しいTODOを入力" required>
        <button type="submit">追加</button>
    </form>

    <ul>
        {% for todo in todos %}
        <li class="{% if todo.completed %}completed{% endif %}">
            <form action="/toggle/{{ loop.index0 }}" method="POST" style="display:inline;">
                <button type="submit" class="check" title="完了切り替え">✔</button>
            </form>
            <span class="todo-title">{{ todo.title }}</span>
            <span class="todo-actions">
                <form action="/delete/{{ loop.index0 }}" method="POST" style="display:inline;">
                    <button type="submit" class="delete-btn">削除</button>
                </form>
            </span>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
