name: "Work 4: Lint, Test and AI Review"

on:
  push:
    branches:
      - 'feature/work-4*'
  pull_request:
    branches:
      - main
    paths:
      - '*.py'
      - 'templates/**'
      - 'tests/**'
      - 'Dockerfile'
      - 'requirements.txt'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    if: contains(github.head_ref || github.ref_name, 'work-4')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t todo-app .

      - name: Run lint
        run: docker run --rm todo-app ruff check app.py todo.py tests/

      - name: Run tests
        run: docker run --rm todo-app pytest tests/

  request-ai-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.head_ref, 'work-4')
    steps:
      - name: Request Copilot review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --add-reviewer copilot
