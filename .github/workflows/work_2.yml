name: "Work 2: Lint and Test"

on:
  push:
    branches:
      - 'feature/work-2*'
  pull_request:
    branches:
      - main
    paths:
      - 'work_2/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    if: contains(github.head_ref || github.ref_name, 'work-2')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t todo-app ./work_2

      - name: Run lint
        run: docker run --rm todo-app ruff check app.py todo.py tests/

      - name: Run tests
        run: docker run --rm todo-app pytest tests/
